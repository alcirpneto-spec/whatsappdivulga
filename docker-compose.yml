services:
  db:
    image: postgres:16-alpine
    container_name: whatsappdivulga-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-whatsappdivulga}
      - POSTGRES_USER=${POSTGRES_USER:-bot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-botpass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bot} -d ${POSTGRES_DB:-whatsappdivulga}"]
      interval: 10s
      timeout: 5s
      retries: 5

  baileys-worker:
    build: ./baileys-bot
    container_name: whatsappdivulga-baileys
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://bot:botpass@db:5432/whatsappdivulga}
      - WHATSAPP_GROUP_NAME=${WHATSAPP_GROUP_NAME:-Achadinhos Online TOP}
      - BAILEYS_GROUP_JID=${BAILEYS_GROUP_JID:-}
      - POLL_INTERVAL_SECONDS=${POLL_INTERVAL_SECONDS:-60}
      - MAX_LINKS_PER_CYCLE=${MAX_LINKS_PER_CYCLE:-10}
      - SEND_INTERVAL_SECONDS=${SEND_INTERVAL_SECONDS:-300}
      - QUEUE_REFRESH_INTERVAL_SECONDS=${QUEUE_REFRESH_INTERVAL_SECONDS:-3600}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./baileys-auth:/app/auth

  shopee-discoverer:
    build:
      context: .
      dockerfile: Dockerfile.shopee
    container_name: whatsappdivulga-shopee-discoverer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://bot:botpass@db:5432/whatsappdivulga}
      - USE_SHOPEE_API=${USE_SHOPEE_API:-True}
      - SCHEDULE_INTERVAL_MINUTES=${SCHEDULE_INTERVAL_MINUTES:-30}
      - SHOPEE_DISCOVERY_LIMIT=${SHOPEE_DISCOVERY_LIMIT:-10}
      - SHOPEE_DISCOVERY_KEYWORDS=${SHOPEE_DISCOVERY_KEYWORDS:-carregador,ferramenta,eletronico,casa,beleza}
      - SHOPEE_APP_ID=${SHOPEE_APP_ID:-}
      - SHOPEE_APP_SECRET=${SHOPEE_APP_SECRET:-}
      - SHOPEE_AFFILIATE_ID=${SHOPEE_AFFILIATE_ID:-}

  link-admin-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: whatsappdivulga-link-admin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://bot:botpass@db:5432/whatsappdivulga}
      - WEB_PORT=8080

  nginx:
    image: nginx:1.27-alpine
    container_name: whatsappdivulga-nginx
    restart: unless-stopped
    depends_on:
      - link-admin-web
    ports:
      - "80:80"
    volumes:
      - ./nginx/templates/default.conf.template:/etc/nginx/templates/default.conf.template:ro

volumes:
  postgres_data:
