services:
  db:
    image: postgres:16-alpine
    container_name: whatsappdivulga-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=whatsappdivulga
      - POSTGRES_USER=bot
      - POSTGRES_PASSWORD=botpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d whatsappdivulga"]
      interval: 10s
      timeout: 5s
      retries: 5

  baileys-worker:
    build: ./baileys-bot
    container_name: whatsappdivulga-baileys
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://bot:botpass@db:5432/whatsappdivulga
      - WHATSAPP_GROUP_NAME=Achadinhos Online TOP
      - BAILEYS_GROUP_JID=
      - POLL_INTERVAL_SECONDS=60
      - MAX_LINKS_PER_CYCLE=10
      - LOG_LEVEL=info
    volumes:
      - ./baileys-auth:/app/auth

  shopee-discoverer:
    build:
      context: .
      dockerfile: Dockerfile.shopee
    container_name: whatsappdivulga-shopee-discoverer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://bot:botpass@db:5432/whatsappdivulga
      - USE_SHOPEE_API=${USE_SHOPEE_API:-True}
      - SCHEDULE_INTERVAL_MINUTES=${SCHEDULE_INTERVAL_MINUTES:-30}
      - SHOPEE_DISCOVERY_LIMIT=${SHOPEE_DISCOVERY_LIMIT:-10}
      - SHOPEE_DISCOVERY_KEYWORDS=${SHOPEE_DISCOVERY_KEYWORDS:-carregador,ferramenta,eletronico,casa,beleza}
      - SHOPEE_APP_ID=${SHOPEE_APP_ID:-}
      - SHOPEE_APP_SECRET=${SHOPEE_APP_SECRET:-}
      - SHOPEE_AFFILIATE_ID=${SHOPEE_AFFILIATE_ID:-}

volumes:
  postgres_data:
