<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel de Links | WhatsApp Divulga</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">whatsapp divulga</p>
        <h1>Cadastro de Ofertas</h1>
        <p class="subtitle">Cadastre links em segundos e deixe o worker enviar automaticamente.</p>
      </header>

      <section class="panel">
        <form id="link-form" class="form-grid" novalidate>
          <label class="field">
            <span>Codigo/ID do Produto</span>
            <input id="product_name" name="product_name" type="text" placeholder="Ex: 1MZKB6-53Q4" required />
          </label>

          <label class="field field-wide">
            <span>URL de Afiliado</span>
            <input
              id="affiliate_url"
              name="affiliate_url"
              type="url"
              placeholder="https://..."
              required
            />
          </label>

          <label class="field">
            <span>Fonte</span>
            <select id="source" name="source">
              <option value="auto" selected>Auto detectar</option>
              <option value="mercado_livre">Mercado Livre</option>
              <option value="amazon">Amazon</option>
              <option value="shopee">Shopee</option>
            </select>
          </label>

          <div class="actions">
            <button id="submit-btn" type="submit">Cadastrar Link</button>
          </div>
        </form>

        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section class="panel recent-panel">
        <div class="recent-header">
          <h2>Ultimos Cadastros</h2>
          <button id="refresh-btn" type="button" class="ghost">Atualizar</button>
        </div>
        <div id="recent-list" class="recent-list"></div>
      </section>

      <section class="panel monitor-panel">
        <div class="recent-header">
          <h2>Monitor de Fila e Shopee</h2>
          <button id="refresh-monitor-btn" type="button" class="ghost">Atualizar Monitor</button>
        </div>

        <div class="monitor-grid">
          <article class="monitor-card">
            <p class="monitor-label">Proxima busca Shopee</p>
            <p id="shopee-countdown" class="monitor-value">--:--</p>
            <p id="shopee-meta" class="monitor-meta">Somente descoberta Shopee.</p>
          </article>

          <article class="monitor-card">
            <p class="monitor-label">Fila pendente para postar</p>
            <p id="queue-total" class="monitor-value">0</p>
            <p id="queue-by-source" class="monitor-meta">Carregando...</p>
          </article>
        </div>

        <div id="queue-list" class="queue-list"></div>
      </section>
    </main>

    <script>
      const form = document.getElementById('link-form');
      const statusEl = document.getElementById('status');
      const submitBtn = document.getElementById('submit-btn');
      const refreshBtn = document.getElementById('refresh-btn');
      const refreshMonitorBtn = document.getElementById('refresh-monitor-btn');
      const recentList = document.getElementById('recent-list');
      const shopeeCountdownEl = document.getElementById('shopee-countdown');
      const shopeeMetaEl = document.getElementById('shopee-meta');
      const queueTotalEl = document.getElementById('queue-total');
      const queueBySourceEl = document.getElementById('queue-by-source');
      const queueListEl = document.getElementById('queue-list');

      let countdownSeconds = 0;

      function setStatus(message, kind = 'info') {
        statusEl.textContent = message;
        statusEl.dataset.kind = kind;
      }

      function formatDate(isoDate) {
        if (!isoDate) return '-';
        const date = new Date(isoDate);
        if (Number.isNaN(date.getTime())) return '-';
        return date.toLocaleString('pt-BR');
      }

      function renderRecent(items) {
        if (!items || items.length === 0) {
          recentList.innerHTML = '<p class="empty">Nenhum cadastro encontrado ainda.</p>';
          return;
        }

        recentList.innerHTML = items
          .map(
            (item) => `
              <article class="recent-item">
                <div class="tag">${item.source || '-'}</div>
                <h3>${item.product_name || '-'}</h3>
                <a href="${item.affiliate_url}" target="_blank" rel="noopener noreferrer">${item.affiliate_url}</a>
                <p>Criado em: ${formatDate(item.created_at)}</p>
              </article>
            `
          )
          .join('');
      }

      function formatDuration(totalSeconds) {
        const safe = Math.max(0, Number(totalSeconds) || 0);
        const hours = Math.floor(safe / 3600);
        const minutes = Math.floor((safe % 3600) / 60);
        const seconds = safe % 60;

        if (hours > 0) {
          return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }
        return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
      }

      function renderQueueItems(items) {
        if (!items || items.length === 0) {
          queueListEl.innerHTML = '<p class="empty">Nenhum item pendente na fila.</p>';
          return;
        }

        queueListEl.innerHTML = items
          .map(
            (item) => `
              <article class="queue-item">
                <div class="tag">${item.source || '-'}</div>
                <h3>${item.product_name || '-'}</h3>
                <p>Adicionado em: ${formatDate(item.created_at)}</p>
              </article>
            `
          )
          .join('');
      }

      function renderMonitor(data) {
        const shopee = data?.shopee_discovery || {};
        const queue = data?.queue || {};

        countdownSeconds = Math.max(0, Number(shopee.seconds_until_next_run) || 0);
        shopeeCountdownEl.textContent = formatDuration(countdownSeconds);

        if (!shopee.enabled) {
          shopeeMetaEl.textContent = 'Descoberta Shopee desativada no .env.';
        } else {
          const status = shopee.status || 'unknown';
          const interval = shopee.interval_minutes || 30;
          shopeeMetaEl.textContent = `Status: ${status} | Ciclo: ${interval} min | Mercado Livre e Amazon seguem fluxo normal.`;
        }

        const pendingTotal = Number(queue.pending_total) || 0;
        queueTotalEl.textContent = String(pendingTotal);

        const bySource = queue.pending_by_source || {};
        const sourceText = Object.entries(bySource)
          .map(([source, total]) => `${source}: ${total}`)
          .join(' | ');
        queueBySourceEl.textContent = sourceText || 'Sem pendencias por fonte.';

        renderQueueItems(queue.pending_items || []);
      }

      async function loadMonitor() {
        try {
          const response = await fetch('/api/dashboard');
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.message || 'Falha ao carregar monitor.');
          }
          renderMonitor(data);
        } catch (error) {
          shopeeMetaEl.textContent = 'Erro ao carregar monitor.';
          queueBySourceEl.textContent = 'Erro ao carregar fila.';
          queueListEl.innerHTML = '<p class="empty">Erro ao carregar fila pendente.</p>';
        }
      }

      async function loadRecent() {
        try {
          const response = await fetch('/api/recent');
          const data = await response.json();
          renderRecent(data.items || []);
        } catch (error) {
          recentList.innerHTML = '<p class="empty">Erro ao carregar lista recente.</p>';
        }
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        setStatus('Enviando...', 'info');
        submitBtn.disabled = true;

        const payload = {
          product_name: document.getElementById('product_name').value.trim(),
          affiliate_url: document.getElementById('affiliate_url').value.trim(),
          source: document.getElementById('source').value,
        };

        try {
          const response = await fetch('/api/affiliate-links', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });

          const data = await response.json();
          if (!response.ok || !data.ok) {
            setStatus(data.message || 'Falha ao cadastrar link.', 'error');
            return;
          }

          setStatus(data.message || 'Cadastro realizado com sucesso.', 'success');
          form.reset();
          await loadRecent();
        } catch (error) {
          setStatus('Erro de rede ao cadastrar. Tente novamente.', 'error');
        } finally {
          submitBtn.disabled = false;
        }
      });

      refreshBtn.addEventListener('click', loadRecent);
      refreshMonitorBtn.addEventListener('click', loadMonitor);

      loadRecent();
      loadMonitor();

      setInterval(() => {
        countdownSeconds = Math.max(0, countdownSeconds - 1);
        shopeeCountdownEl.textContent = formatDuration(countdownSeconds);
      }, 1000);

      setInterval(loadMonitor, 5 * 60 * 1000);
    </script>
  </body>
</html>
